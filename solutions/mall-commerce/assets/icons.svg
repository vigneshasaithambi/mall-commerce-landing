    <circle cx="29" cy="29" r="11" class="ic-l"/>
    <path class="ic-l" d="M37 37l9 9"/>
  </symbol>

  <!-- Fold 4: AI assistants -->
  <symbol id="i-bot" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <rect x="16" y="22" width="32" height="22" rx="6" class="ic-l"/>
    <circle cx="26" cy="33" r="2" class="ic-f"/>
    <circle cx="38" cy="33" r="2" class="ic-f"/>
    <path class="ic-l" d="M32 16v6"/>
  </symbol>

  <!-- Fold 4: promo -->
  <symbol id="i-promo" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <path class="ic-l" d="M44 16l-22 8-8 4v8l8 4 4 12 4-2-2-8 16 6z"/>
