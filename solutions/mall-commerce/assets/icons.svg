<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E2C3FE"/>
      <stop offset=".5" stop-color="#927EFF"/>
      <stop offset="1" stop-color="#086FFD"/>
    </linearGradient>
    <style>
      .ic-bg{fill:url(#ig)}
      .ic-l{fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .ic-f{fill:#fff}
    </style>
  </defs>

  <!-- Fold 2: dashboard -->
  <symbol id="i-dashboard" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <rect x="14" y="16" width="36" height="14" rx="3" class="ic-f"/>
    <rect x="14" y="34" width="16" height="14" rx="3" class="ic-f"/>
    <rect x="34" y="34" width="16" height="14" rx="3" class="ic-f"/>
  </symbol>

  <!-- Fold 2: AI -->
  <symbol id="i-ai" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <path class="ic-l" d="M22 42l6-20 6 20M24 36h8M40 22v20"/>
    <circle cx="40" cy="22" r="2" class="ic-f"/>
  </symbol>

  <!-- Fold 2: logistics -->
  <symbol id="i-truck" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <rect x="12" y="24" width="22" height="16" rx="2" class="ic-l"/>
    <path class="ic-l" d="M34 28h10l6 6v6H34z"/>
    <circle cx="20" cy="44" r="3" class="ic-f"/>
    <circle cx="42" cy="44" r="3" class="ic-f"/>
  </symbol>

  <!-- Fold 2: flywheel -->
  <symbol id="i-flywheel" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <path class="ic-l" d="M44 24a14 14 0 1 0 4 10"/>
    <path class="ic-l" d="M48 18v8h-8"/>
  </symbol>

  <!-- Fold 3: storefront -->
  <symbol id="i-store" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <path class="ic-l" d="M16 26l4-8h24l4 8v4a4 4 0 0 1-8 0 4 4 0 0 1-8 0 4 4 0 0 1-8 0 4 4 0 0 1-8 0z"/>
    <path class="ic-l" d="M18 30v18h28V30"/>
  </symbol>

  <!-- Fold 3: cart -->
  <symbol id="i-cart" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <path class="ic-l" d="M14 18h6l4 22h22l4-16H22"/>
    <circle cx="26" cy="46" r="3" class="ic-f"/>
    <circle cx="42" cy="46" r="3" class="ic-f"/>
  </symbol>

  <!-- Fold 3: recommendations -->
  <symbol id="i-reco" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <path class="ic-l" d="M32 18l3.6 7.4 8.4 1-6 5.8 1.4 8.2L32 36.6 24.6 40.4 26 32.2l-6-5.8 8.4-1z"/>
  </symbol>

  <!-- Fold 3: loyalty -->
  <symbol id="i-loyalty" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <path class="ic-l" d="M32 46c-10-6-16-12-16-20a8 8 0 0 1 16-2 8 8 0 0 1 16 2c0 8-6 14-16 20z"/>
  </symbol>

  <!-- Fold 4: builder -->
  <symbol id="i-builder" viewBox="0 0 64 64">
    <rect class="ic-bg" width="64" height="64" rx="16"/>
    <rect x="14" y="16" width="36" height="32" rx="3" class="ic-l"/>
    <path class="ic-l" d="M14 24h36M20 32h12M20 38h18"/>
  </symbol>

  <!-- Fold 4: discovery -->
  <symbol id="i-discover" viewBox="0 0 64 64">
