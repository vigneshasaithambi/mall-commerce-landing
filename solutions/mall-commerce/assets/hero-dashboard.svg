  <rect x="542" y="250" width="80" height="10" rx="5" fill="#0b0d12"/>
  <g>
    <circle cx="552" cy="284" r="10" fill="url(#g1)"/>
    <rect x="570" y="278" width="70" height="6" rx="3" fill="#0b0d12"/>
