  </g>
  <g>
    <rect x="526" y="134" width="155" height="86" rx="12" fill="url(#g1)"/>
    <rect x="542" y="150" width="60" height="8" rx="4" fill="rgba(255,255,255,.6)"/>
    <rect x="542" y="170" width="100" height="20" rx="4" fill="#fff"/>
    <rect x="542" y="200" width="40" height="8" rx="4" fill="rgba(255,255,255,.7)"/>
  </g>

  <!-- chart -->
  <rect x="190" y="234" width="323" height="190" rx="12" fill="#fff" stroke="#ececf2"/>
  <rect x="206" y="250" width="120" height="10" rx="5" fill="#0b0d12"/>
  <polyline points="206,400 240,360 274,380 308,330 342,350 376,290 410,310 444,250 478,270 498,240" fill="none" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="206,410 240,400 274,395 308,380 342,385 376,360 410,370 444,340 478,345 498,330" fill="none" stroke="#c9c7d6" stroke-width="2" stroke-dasharray="3 4"/>

  <!-- tenants list -->
