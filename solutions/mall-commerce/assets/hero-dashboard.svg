<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-label="Mall commerce dashboard preview">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E2C3FE"/>
      <stop offset=".5" stop-color="#927EFF"/>
      <stop offset="1" stop-color="#086FFD"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#927EFF"/>
      <stop offset="1" stop-color="#086FFD"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0b0d12" flood-opacity=".18"/>
    </filter>
  </defs>

  <!-- window frame -->
  <rect x="20" y="20" width="680" height="420" rx="18" fill="#fff" stroke="#ececf2" filter="url(#shadow)"/>
  <rect x="20" y="20" width="680" height="44" rx="18" fill="#f7f6fb"/>
  <rect x="20" y="46" width="680" height="18" fill="#f7f6fb"/>
  <circle cx="44" cy="42" r="5" fill="#ff6058"/>
  <circle cx="62" cy="42" r="5" fill="#ffbd2e"/>
  <circle cx="80" cy="42" r="5" fill="#27c93f"/>
  <rect x="220" y="32" width="280" height="20" rx="10" fill="#fff" stroke="#ececf2"/>

  <!-- sidebar -->
  <rect x="20" y="64" width="150" height="376" fill="#fafaff"/>
  <rect x="40" y="92" width="110" height="10" rx="5" fill="url(#g1)"/>
  <rect x="40" y="120" width="90" height="8" rx="4" fill="#ececf2"/>
  <rect x="40" y="142" width="100" height="8" rx="4" fill="#ececf2"/>
  <rect x="40" y="164" width="80" height="8" rx="4" fill="#ececf2"/>
  <rect x="40" y="186" width="95" height="8" rx="4" fill="#ececf2"/>
  <rect x="40" y="208" width="85" height="8" rx="4" fill="#ececf2"/>

  <!-- header strip -->
  <rect x="190" y="84" width="200" height="14" rx="7" fill="#0b0d12"/>
  <rect x="190" y="106" width="320" height="8" rx="4" fill="#c9c7d6"/>

  <!-- KPI cards -->
  <g>
    <rect x="190" y="134" width="155" height="86" rx="12" fill="#fff" stroke="#ececf2"/>
    <rect x="206" y="150" width="60" height="8" rx="4" fill="#c9c7d6"/>
    <rect x="206" y="170" width="90" height="20" rx="4" fill="#0b0d12"/>
    <rect x="206" y="200" width="40" height="8" rx="4" fill="url(#g2)"/>
  </g>
  <g>
    <rect x="358" y="134" width="155" height="86" rx="12" fill="#fff" stroke="#ececf2"/>
    <rect x="374" y="150" width="60" height="8" rx="4" fill="#c9c7d6"/>
    <rect x="374" y="170" width="80" height="20" rx="4" fill="#0b0d12"/>
